<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAFC Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#1C1929; color:#F5F1EB; height:100vh; overflow:hidden; }
.login-wrap { display:flex; align-items:center; justify-content:center; height:100vh; }
.login-box { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:20px; padding:40px; width:100%; max-width:400px; }
.logo { font-size:24px; font-weight:600; color:#B89A6A; letter-spacing:2px; margin-bottom:8px; }
.login-box h2 { font-size:22px; font-weight:400; margin-bottom:6px; }
.login-box p { color:rgba(245,241,235,0.4); font-size:14px; margin-bottom:28px; }
.lbl { display:block; font-size:11px; color:rgba(245,241,235,0.5); margin-bottom:6px; }
.inp { width:100%; background:rgba(245,241,235,0.06); border:1px solid rgba(245,241,235,0.12); border-radius:10px; padding:12px 14px; color:#F5F1EB; font-size:14px; margin-bottom:14px; outline:none; }
.inp:focus { border-color:rgba(184,154,106,0.4); }
.btn-login { width:100%; background:#B89A6A; border:none; border-radius:10px; padding:14px; color:#1C1929; font-size:15px; font-weight:600; cursor:pointer; }
.btn-login:disabled { opacity:0.5; }
.err { color:#E05555; font-size:13px; margin-top:8px; display:none; }
.app { display:none; height:100vh; }
.app.on { display:flex; }
.sidebar { width:280px; min-width:280px; background:rgba(245,241,235,0.03); border-right:1px solid rgba(245,241,235,0.08); display:flex; flex-direction:column; }
.s-head { padding:12px 16px; border-bottom:1px solid rgba(245,241,235,0.08); display:flex; align-items:center; justify-content:space-between; }
.s-logo { font-size:16px; font-weight:600; color:#B89A6A; letter-spacing:2px; }
.s-btns { display:flex; gap:5px; }
.btn-sm { padding:5px 9px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:500; border:none; }
.btn-json { background:rgba(29,158,117,0.2); color:#1D9E75; }
.btn-csv { background:rgba(184,154,106,0.2); color:#B89A6A; }
.btn-out { background:none; border:1px solid rgba(245,241,235,0.15); color:rgba(245,241,235,0.5); }
.s-search { padding:10px; border-bottom:1px solid rgba(245,241,235,0.08); }
.s-search input { width:100%; background:rgba(245,241,235,0.06); border:1px solid rgba(245,241,235,0.1); border-radius:8px; padding:8px 12px; color:#F5F1EB; font-size:13px; outline:none; }
.p-list { flex:1; overflow-y:auto; }
.p-item { padding:11px 16px; cursor:pointer; border-bottom:1px solid rgba(245,241,235,0.04); }
.p-item:hover { background:rgba(245,241,235,0.04); }
.p-item.on { background:rgba(184,154,106,0.1); border-left:3px solid #B89A6A; }
.p-name { font-size:14px; font-weight:500; }
.p-meta { font-size:11px; color:rgba(245,241,235,0.4); margin-top:2px; }
.main { flex:1; overflow-y:auto; }
.m-head { padding:16px 24px; border-bottom:1px solid rgba(245,241,235,0.08); }
.m-head h2 { font-size:20px; font-weight:400; }
.m-head .sub { font-size:13px; color:rgba(245,241,235,0.4); margin-top:4px; }
.m-body { padding:20px 24px; }
.empty { display:flex; align-items:center; justify-content:center; height:80vh; color:rgba(245,241,235,0.3); font-size:14px; }
.sec { font-size:10px; color:rgba(245,241,235,0.4); letter-spacing:0.5px; margin:18px 0 8px; }
.sec:first-child { margin-top:0; }
.info-box { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:12px; padding:14px; }
.i-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(245,241,235,0.06); font-size:13px; }
.i-row:last-child { border:none; }
.i-lbl { color:rgba(245,241,235,0.4); }
.i-val { color:#F5F1EB; font-weight:500; }
.v-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; }
.v-card { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:12px; padding:14px; cursor:pointer; }
.v-card:hover { border-color:rgba(184,154,106,0.3); }
.v-card.on { border-color:#B89A6A; background:rgba(184,154,106,0.08); }
.v-type { font-size:10px; font-weight:600; color:#B89A6A; margin-bottom:4px; }
.v-region { font-size:14px; font-weight:500; margin-bottom:3px; }
.v-date { font-size:11px; color:rgba(245,241,235,0.4); }
.ph-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
.ph-card { border-radius:10px; overflow:hidden; background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); }
.ph-card img { width:100%; aspect-ratio:3/4; object-fit:cover; cursor:pointer; display:block; }
.ph-card img:hover { opacity:0.85; }
.ph-lbl { padding:5px 8px; font-size:10px; color:rgba(245,241,235,0.5); }
.doc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
.doc-card { border-radius:10px; overflow:hidden; background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); }
.doc-card img { width:100%; aspect-ratio:1; object-fit:cover; cursor:pointer; display:block; }
.doc-card img:hover { opacity:0.85; }
.notes-box { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:12px; padding:14px; font-size:13px; color:rgba(245,241,235,0.7); line-height:1.6; }
.lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:999; align-items:center; justify-content:center; }
.lb.on { display:flex; }
.lb img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:8px; }
.lb-x { position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:none; color:#fff; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:20px; }
.loader { padding:30px; text-align:center; color:rgba(245,241,235,0.3); font-size:13px; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:rgba(245,241,235,0.15); border-radius:2px; }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="logo">AAFC</div>
    <h2>Panel Login</h2>
    <p>Sign in with your clinic account</p>
    <span class="lbl">EMAIL</span>
    <input class="inp" type="email" id="iEmail" placeholder="clinic@email.com"/>
    <span class="lbl">PASSWORD</span>
    <input class="inp" type="password" id="iPass" placeholder="••••••••"/>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Sign In</button>
    <div class="err" id="loginErr">Invalid email or password</div>
  </div>
</div>

<div class="app" id="app">
  <div class="sidebar">
    <div class="s-head">
      <span class="s-logo">AAFC</span>
      <div class="s-btns">
        <button class="btn-sm btn-json" onclick="dlJSON()">JSON</button>
        <button class="btn-sm btn-csv" onclick="dlCSV()">CSV</button>
        <button class="btn-sm btn-out" onclick="doLogout()">Sign Out</button>
      </div>
    </div>
    <div class="s-search">
      <input type="text" id="search" placeholder="Search patients..." oninput="filterP()"/>
    </div>
    <div class="p-list" id="pList"><div class="loader">Loading...</div></div>
  </div>
  <div class="main">
    <div class="empty" id="emptyMsg">Select a patient</div>
    <div id="pDetail" style="display:none">
      <div class="m-head">
        <h2 id="dName"></h2>
        <div class="sub" id="dMeta"></div>
      </div>
      <div class="m-body">
        <div class="sec">PATIENT INFO</div>
        <div class="info-box" id="pInfo"></div>
        <div class="sec">VISITS</div>
        <div class="v-grid" id="vList"></div>
        <div id="vDetail" style="display:none">
          <div class="sec">VISIT INFO</div>
          <div class="info-box" id="vInfo"></div>
          <div id="notesWrap" style="display:none">
            <div class="sec">NOTES</div>
            <div class="notes-box" id="vNotes"></div>
          </div>
          <div id="phWrap" style="display:none">
            <div class="sec">PHOTOS</div>
            <div class="ph-grid" id="phGrid"></div>
          </div>
          <div id="kartWrap" style="display:none">
            <div class="sec">TREATMENT CARD</div>
            <div class="doc-grid" id="kartGrid"></div>
          </div>
          <div id="onamWrap" style="display:none">
            <div class="sec">PATIENT CONSENT</div>
            <div class="doc-grid" id="onamGrid"></div>
          </div>
          <div id="barkodWrap" style="display:none">
            <div class="sec">PRODUCT BARCODE</div>
            <div class="doc-grid" id="barkodGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="lb" id="lb" onclick="closeLb()">
  <button class="lb-x" onclick="closeLb()">x</button>
  <img id="lbImg" src="" alt=""/>
</div>

<script>
const SB_URL = 'https://hugxacklprzujswtaike.supabase.co';
const SB_KEY = 'sb_publishable_LX6iLHBbCePCCdnsTeVwlA_IE7BwBkX';
const db = supabase.createClient(SB_URL, SB_KEY);
const AL = ['Front','Left 45','Left Profile','Right 45','Right Profile'];
let cid = null, patients = [], selPid = null, selVid = null, visits = [];

window.onload = async function() {
  const { data: { session } } = await db.auth.getSession();
  if (session) await showApp(session.user);
};

async function doLogin() {
  const email = document.getElementById('iEmail').value.trim();
  const pass = document.getElementById('iPass').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginErr');
  if (!email || !pass) { err.style.display='block'; err.textContent='Please fill all fields'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...'; err.style.display = 'none';
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) {
    err.style.display = 'block'; err.textContent = 'Invalid email or password';
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    await showApp(data.user);
  }
}

async function doLogout() {
  await db.auth.signOut();
  cid = null; patients = [];
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('app').classList.remove('on');
}

async function showApp(user) {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').classList.add('on');
  const { data: u } = await db.from('users').select('clinic_id').eq('auth_id', user.id).single();
  if (!u) { alert('User not found'); return; }
  cid = u.clinic_id;
  await loadPatients();
}

async function loadPatients() {
  const { data } = await db.from('patients').select('*').eq('clinic_id', cid).order('created_at', { ascending: false });
  patients = data || [];
  renderP(patients);
}

function renderP(list) {
  const el = document.getElementById('pList');
  if (!list.length) { el.innerHTML = '<div class="loader">No patients</div>'; return; }
  let html = '';
  list.forEach(function(p) {
    const cls = p.id === selPid ? 'on' : '';
    const meta = [p.birth_date, p.phone].filter(Boolean).join(' · ');
    html += '<div class="p-item ' + cls + '" onclick="selPatient(\'' + p.id + '\')">';
    html += '<div class="p-name">' + p.name + ' ' + (p.surname||'') + '</div>';
    html += '<div class="p-meta">' + meta + '</div></div>';
  });
  el.innerHTML = html;
}

function filterP() {
  const q = document.getElementById('search').value.toLowerCase();
  renderP(patients.filter(function(p) { return (p.name+' '+(p.surname||'')).toLowerCase().includes(q); }));
}

async function selPatient(id) {
  selPid = id; selVid = null;
  filterP();
  const p = patients.find(function(x) { return x.id === id; });
  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('pDetail').style.display = 'block';
  document.getElementById('vDetail').style.display = 'none';
  document.getElementById('dName').textContent = p.name + ' ' + (p.surname||'');
  document.getElementById('dMeta').textContent = [p.birth_date, p.phone, p.city].filter(Boolean).join(' · ');
  let infoHtml = '';
  infoHtml += '<div class="i-row"><span class="i-lbl">Name</span><span class="i-val">' + p.name + ' ' + (p.surname||'') + '</span></div>';
  infoHtml += '<div class="i-row"><span class="i-lbl">Date of Birth</span><span class="i-val">' + (p.birth_date||'-') + '</span></div>';
  infoHtml += '<div class="i-row"><span class="i-lbl">Phone</span><span class="i-val">' + (p.phone||'-') + '</span></div>';
  infoHtml += '<div class="i-row"><span class="i-lbl">City</span><span class="i-val">' + (p.city||'-') + '</span></div>';
  if (p.notes) infoHtml += '<div class="i-row"><span class="i-lbl">Notes</span><span class="i-val">' + p.notes + '</span></div>';
  document.getElementById('pInfo').innerHTML = infoHtml;
  document.getElementById('vList').innerHTML = '<div class="loader">Loading...</div>';
  const { data } = await db.from('visits').select('*').eq('patient_id', id).order('created_at', { ascending: false });
  visits = data || [];
  renderV();
}

function renderV() {
  const el = document.getElementById('vList');
  if (!visits.length) { el.innerHTML = '<div style="color:rgba(245,241,235,0.3);font-size:13px">No visits</div>'; return; }
  let html = '';
  visits.forEach(function(v) {
    const cls = v.id === selVid ? 'on' : '';
    html += '<div class="v-card ' + cls + '" onclick="selVisit(\'' + v.id + '\')">';
    html += '<div class="v-type">' + (v.visit_type||'Visit') + '</div>';
    html += '<div class="v-region">' + (v.region||'') + '</div>';
    html += '<div class="v-date">' + (v.visit_date||'') + '</div></div>';
  });
  el.innerHTML = html;
}

async function selVisit(id) {
  selVid = id;
  renderV();
  const v = visits.find(function(x) { return x.id === id; });
  document.getElementById('vDetail').style.display = 'block';
  let vi = '';
  vi += '<div class="i-row"><span class="i-lbl">Type</span><span class="i-val">' + (v.visit_type||'-') + '</span></div>';
  vi += '<div class="i-row"><span class="i-lbl">Region</span><span class="i-val">' + (v.region||'-') + '</span></div>';
  vi += '<div class="i-row"><span class="i-lbl">Date</span><span class="i-val">' + (v.visit_date||'-') + '</span></div>';
  document.getElementById('vInfo').innerHTML = vi;
  if (v.notes) {
    document.getElementById('notesWrap').style.display = 'block';
    document.getElementById('vNotes').textContent = v.notes;
  } else { document.getElementById('notesWrap').style.display = 'none'; }
  const { data: photos } = await db.from('photos').select('*').eq('visit_id', id).order('angle_index');
  if (photos && photos.length) {
    document.getElementById('phWrap').style.display = 'block';
    let ph = '';
    photos.forEach(function(p) {
      ph += '<div class="ph-card"><img src="' + p.file_path + '" onclick="openLb(\'' + p.file_path + '\')"/>';
      ph += '<div class="ph-lbl">' + (AL[p.angle_index]||'Photo') + '</div></div>';
    });
    document.getElementById('phGrid').innerHTML = ph;
  } else { document.getElementById('phWrap').style.display = 'none'; }
  const { data: docs } = await db.from('documents').select('*').eq('visit_id', id);
  showDocs('kartWrap', 'kartGrid', (docs||[]).filter(function(d) { return d.doc_type === 'kart'; }));
  showDocs('onamWrap', 'onamGrid', (docs||[]).filter(function(d) { return d.doc_type === 'onam'; }));
  showDocs('barkodWrap', 'barkodGrid', (docs||[]).filter(function(d) { return d.doc_type === 'barkod'; }));
}

function showDocs(wid, gid, docs) {
  if (!docs.length) { document.getElementById(wid).style.display = 'none'; return; }
  document.getElementById(wid).style.display = 'block';
  let html = '';
  docs.forEach(function(d) {
    html += '<div class="doc-card"><img src="' + d.file_path + '" onclick="openLb(\'' + d.file_path + '\')"/></div>';
  });
  document.getElementById(gid).innerHTML = html;
}

function openLb(src) { document.getElementById('lbImg').src = src; document.getElementById('lb').classList.add('on'); }
function closeLb() { document.getElementById('lb').classList.remove('on'); }

async function dlJSON() {
  const { data: ps } = await db.from('patients').select('*').eq('clinic_id', cid);
  const all = [];
  for (let i = 0; i < (ps||[]).length; i++) {
    const p = ps[i];
    const { data: vs } = await db.from('visits').select('*').eq('patient_id', p.id);
    const vd = [];
    for (let j = 0; j < (vs||[]).length; j++) {
      const v = vs[j];
      const { data: ph } = await db.from('photos').select('*').eq('visit_id', v.id);
      const { data: dc } = await db.from('documents').select('*').eq('visit_id', v.id);
      vd.push(Object.assign({}, v, { photos: ph||[], documents: dc||[] }));
    }
    all.push(Object.assign({}, p, { visits: vd }));
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify({ date: new Date().toISOString(), patients: all }, null, 2)], { type: 'application/json' }));
  a.download = 'aafc_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
}

async function dlCSV() {
  const { data: ps } = await db.from('patients').select('id,name,surname').eq('clinic_id', cid);
  const rows = ['Patient,Surname,Visit Date,Region,Photo URL'];
  for (let i = 0; i < (ps||[]).length; i++) {
    const p = ps[i];
    const { data: vs } = await db.from('visits').select('*').eq('patient_id', p.id);
    for (let j = 0; j < (vs||[]).length; j++) {
      const v = vs[j];
      const { data: ph } = await db.from('photos').select('*').eq('visit_id', v.id);
      for (let k = 0; k < (ph||[]).length; k++) {
        rows.push([p.name, p.surname||'', v.visit_date||'', v.region||'', ph[k].file_path].join(','));
      }
    }
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows.join('\n')], { type: 'text/csv' }));
  a.download = 'aafc_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}
</script>
</body>
</html>
