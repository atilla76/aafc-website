<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAFC Panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#1C1929; color:#F5F1EB; height:100vh; overflow:hidden; }
.login-wrap { display:flex; align-items:center; justify-content:center; height:100vh; }
.login-box { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:20px; padding:40px; width:100%; max-width:400px; }
.login-box .logo { font-size:24px; font-weight:600; color:#B89A6A; letter-spacing:2px; margin-bottom:8px; }
.login-box h2 { font-size:22px; font-weight:400; margin-bottom:6px; }
.login-box p { color:rgba(245,241,235,0.4); font-size:14px; margin-bottom:28px; }
label { display:block; font-size:11px; color:rgba(245,241,235,0.5); margin-bottom:6px; letter-spacing:0.5px; }
input { width:100%; background:rgba(245,241,235,0.06); border:1px solid rgba(245,241,235,0.12); border-radius:10px; padding:12px 14px; color:#F5F1EB; font-size:14px; margin-bottom:14px; }
input:focus { outline:none; border-color:rgba(184,154,106,0.4); }
.btn-primary { width:100%; background:#B89A6A; border:none; border-radius:10px; padding:14px; color:#1C1929; font-size:15px; font-weight:600; cursor:pointer; }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
.error { color:#E05555; font-size:13px; margin-top:8px; display:none; }
.app { display:none; height:100vh; }
.app.visible { display:flex; }
.sidebar { width:280px; min-width:280px; background:rgba(245,241,235,0.03); border-right:1px solid rgba(245,241,235,0.08); display:flex; flex-direction:column; }
.sidebar-header { padding:12px 16px; border-bottom:1px solid rgba(245,241,235,0.08); display:flex; align-items:center; justify-content:space-between; gap:8px; }
.sidebar-header .logo { font-size:18px; font-weight:600; color:#B89A6A; letter-spacing:2px; }
.btns { display:flex; gap:6px; align-items:center; }
.btn-dl { border:none; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:500; }
.btn-json { background:rgba(29,158,117,0.15); border:1px solid rgba(29,158,117,0.3) !important; color:#1D9E75; }
.btn-csv { background:rgba(184,154,106,0.15); border:1px solid rgba(184,154,106,0.3) !important; color:#B89A6A; }
.btn-logout { background:none; border:1px solid rgba(245,241,235,0.12); color:rgba(245,241,235,0.5); padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; }
.search-wrap { padding:12px; border-bottom:1px solid rgba(245,241,235,0.08); }
.search-wrap input { margin:0; padding:10px 12px; font-size:13px; }
.patient-list { flex:1; overflow-y:auto; }
.patient-item { padding:12px 16px; cursor:pointer; border-bottom:1px solid rgba(245,241,235,0.04); transition:background 0.15s; }
.patient-item:hover { background:rgba(245,241,235,0.04); }
.patient-item.active { background:rgba(184,154,106,0.1); border-left:3px solid #B89A6A; }
.patient-item .name { font-size:14px; font-weight:500; }
.patient-item .meta { font-size:11px; color:rgba(245,241,235,0.4); margin-top:2px; }
.main { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
.main-header { padding:16px 24px; border-bottom:1px solid rgba(245,241,235,0.08); }
.main-header h2 { font-size:20px; font-weight:400; }
.main-header .meta { font-size:13px; color:rgba(245,241,235,0.4); margin-top:4px; }
.main-content { padding:24px; flex:1; }
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:rgba(245,241,235,0.3); gap:12px; font-size:14px; }
.sec-title { font-size:10px; color:rgba(245,241,235,0.4); letter-spacing:0.16px; margin-bottom:10px; margin-top:20px; }
.sec-title:first-child { margin-top:0; }
/* Info card */
.info-card { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:12px; padding:16px; margin-bottom:4px; }
.info-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(245,241,235,0.06); font-size:13px; }
.info-row:last-child { border-bottom:none; }
.info-row .lbl { color:rgba(245,241,235,0.4); }
.info-row .val { color:#F5F1EB; font-weight:500; }
/* Visits */
.visits-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; }
.visit-card { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:12px; padding:14px; cursor:pointer; transition:all 0.15s; }
.visit-card:hover { border-color:rgba(184,154,106,0.3); }
.visit-card.active { border-color:#B89A6A; background:rgba(184,154,106,0.1); }
.visit-card .vtype { font-size:10px; font-weight:600; color:#B89A6A; margin-bottom:5px; }
.visit-card .vregion { font-size:14px; font-weight:500; margin-bottom:3px; }
.visit-card .vdate { font-size:11px; color:rgba(245,241,235,0.4); }
/* Photos */
.photos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
.photo-card { border-radius:10px; overflow:hidden; background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); }
.photo-card img { width:100%; aspect-ratio:3/4; object-fit:cover; cursor:pointer; display:block; transition:opacity 0.15s; }
.photo-card img:hover { opacity:0.85; }
.photo-card .plabel { padding:5px 8px; font-size:10px; color:rgba(245,241,235,0.5); }
/* Docs */
.docs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
.doc-card { border-radius:10px; overflow:hidden; background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); }
.doc-card img { width:100%; aspect-ratio:1; object-fit:cover; cursor:pointer; display:block; transition:opacity 0.15s; }
.doc-card img:hover { opacity:0.85; }
.doc-card .dlabel { padding:5px 8px; font-size:10px; color:rgba(245,241,235,0.5); }
/* Notes */
.notes-box { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:12px; padding:14px; font-size:13px; color:rgba(245,241,235,0.7); line-height:1.6; }
/* Lightbox */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; align-items:center; justify-content:center; }
.lightbox.open { display:flex; }
.lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:8px; }
.lightbox-close { position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:none; color:white; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:18px; }
.loader { display:flex; align-items:center; justify-content:center; padding:40px; color:rgba(245,241,235,0.3); font-size:14px; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:rgba(245,241,235,0.1); border-radius:2px; }
</style>
</head>
<body>

<div class="login-wrap" id="loginSection">
  <div class="login-box">
    <div class="logo">AAFC</div>
    <h2>Panel Login</h2>
    <p>Sign in with your clinic account</p>
    <label>EMAIL</label>
    <input type="email" id="email" placeholder="clinic@email.com"/>
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="••••••••"/>
    <button class="btn-primary" id="btnLogin">Sign In</button>
    <div class="error" id="loginError">Invalid email or password</div>
  </div>
</div>

<div class="app" id="appSection">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="logo">AAFC</span>
      <div class="btns">
        <button class="btn-dl btn-json" onclick="downloadJSON()">JSON</button>
        <button class="btn-dl btn-csv" onclick="downloadCSV()">CSV</button>
        <button class="btn-logout" id="btnLogout">Sign Out</button>
      </div>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search patients..." oninput="filterPatients()"/>
    </div>
    <div class="patient-list" id="patientList">
      <div class="loader">Loading...</div>
    </div>
  </div>

  <div class="main">
    <div class="empty" id="emptyState">Select a patient to view details</div>
    <div id="patientDetail" style="display:none; flex-direction:column;">
      <div class="main-header">
        <h2 id="detailName"></h2>
        <div class="meta" id="detailMeta"></div>
      </div>
      <div class="main-content">

        <div class="sec-title">PATIENT INFO</div>
        <div class="info-card" id="patientInfo"></div>

        <div class="sec-title">VISITS</div>
        <div class="visits-grid" id="visitsList"></div>

        <div id="visitDetail" style="display:none">
          <div class="sec-title">VISIT INFO</div>
          <div class="info-card" id="visitInfo"></div>

          <div id="notesSection" style="display:none">
            <div class="sec-title">NOTES</div>
            <div class="notes-box" id="visitNotes"></div>
          </div>

          <div id="photosSection" style="display:none">
            <div class="sec-title">PHOTOS</div>
            <div class="photos-grid" id="photosGrid"></div>
          </div>

          <div id="kartSection" style="display:none">
            <div class="sec-title">TREATMENT CARD</div>
            <div class="docs-grid" id="kartGrid"></div>
          </div>

          <div id="onamSection" style="display:none">
            <div class="sec-title">PATIENT CONSENT</div>
            <div class="docs-grid" id="onamGrid"></div>
          </div>

          <div id="barkodSection" style="display:none">
            <div class="sec-title">PRODUCT BARCODE</div>
            <div class="docs-grid" id="barkodGrid"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">x</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://hugxacklprzujswtaike.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LX6iLHBbCePCCdnsTeVwlA_IE7BwBkX';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const angleLabels = ['Front','Left 45','Left Profile','Right 45','Right Profile'];
let clinicId = null, allPatients = [], selectedPatientId = null, selectedVisitId = null, allVisits = [];

async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) await showApp(session.user);
}

document.getElementById('btnLogin').addEventListener('click', async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginError');
  btn.disabled = true; btn.textContent = 'Signing in...';
  err.style.display = 'none';
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) { err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; }
  else await showApp(data.user);
});

document.getElementById('btnLogout').addEventListener('click', async () => {
  await db.auth.signOut();
  clinicId = null; allPatients = [];
  document.getElementById('loginSection').style.display = 'flex';
  document.getElementById('appSection').classList.remove('visible');
});

async function showApp(user) {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('appSection').classList.add('visible');
  const { data: u } = await db.from('users').select('clinic_id').eq('auth_id', user.id).single();
  clinicId = u.clinic_id;
  await loadPatients();
}

async function loadPatients() {
  const { data } = await db.from('patients').select('*').eq('clinic_id', clinicId).order('created_at', { ascending: false });
  allPatients = data || [];
  renderPatients(allPatients);
}

function renderPatients(list) {
  const el = document.getElementById('patientList');
  if (!list.length) { el.innerHTML = '<div class="loader">No patients</div>'; return; }
  el.innerHTML = list.map(p => 
    <div class="patient-item " onclick="selectPatient('')">
      <div class="name"> </div>
      <div class="meta"></div>
    </div>).join('');
}

function filterPatients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderPatients(allPatients.filter(p => (p.name+' '+(p.surname||'')).toLowerCase().includes(q)));
}

async function selectPatient(id) {
  selectedPatientId = id; selectedVisitId = null;
  filterPatients();
  const p = allPatients.find(x => x.id === id);
  document.getElementById('emptyState').style.display = 'none';
  const detail = document.getElementById('patientDetail');
  detail.style.display = 'flex'; detail.style.flexDirection = 'column';
  document.getElementById('detailName').textContent = p.name + ' ' + (p.surname||'');
  document.getElementById('detailMeta').textContent = [p.birth_date, p.phone, p.city].filter(Boolean).join(' · ');
  document.getElementById('visitDetail').style.display = 'none';

  // Hasta bilgileri
  document.getElementById('patientInfo').innerHTML = [
    ['Name', p.name + ' ' + (p.surname||'')],
    ['Date of Birth', p.birth_date||'-'],
    ['Phone', p.phone||'-'],
    ['City', p.city||'-'],
    p.notes ? ['Notes', p.notes] : null
  ].filter(Boolean).map(([l,v]) => <div class="info-row"><span class="lbl"></span><span class="val"></span></div>).join('');

  document.getElementById('visitsList').innerHTML = '<div class="loader">Loading...</div>';
  const { data } = await db.from('visits').select('*').eq('patient_id', id).order('created_at', { ascending: false });
  allVisits = data || [];
  renderVisits(allVisits);
}

function renderVisits(list) {
  const el = document.getElementById('visitsList');
  if (!list.length) { el.innerHTML = '<div style="color:rgba(245,241,235,0.3);font-size:13px">No visits</div>'; return; }
  el.innerHTML = list.map(v => 
    <div class="visit-card " onclick="selectVisit('')">
      <div class="vtype"></div>
      <div class="vregion"></div>
      <div class="vdate"></div>
    </div>).join('');
}

async function selectVisit(id) {
  selectedVisitId = id;
  renderVisits(allVisits);
  const v = allVisits.find(x => x.id === id);
  document.getElementById('visitDetail').style.display = 'block';

  // Vizit bilgileri
  document.getElementById('visitInfo').innerHTML = [
    ['Type', v.visit_type||'-'],
    ['Region', v.region||'-'],
    ['Date', v.visit_date||'-'],
  ].map(([l,v2]) => <div class="info-row"><span class="lbl"></span><span class="val"></span></div>).join('');

  // Notlar
  if (v.notes) {
    document.getElementById('notesSection').style.display = 'block';
    document.getElementById('visitNotes').textContent = v.notes;
  } else {
    document.getElementById('notesSection').style.display = 'none';
  }

  // Fotograflar
  const { data: photos } = await db.from('photos').select('*').eq('visit_id', id).order('angle_index');
  if (photos && photos.length) {
    document.getElementById('photosSection').style.display = 'block';
    document.getElementById('photosGrid').innerHTML = photos.map(p => 
      <div class="photo-card">
        <img src="" onclick="openLightbox('')"/>
        <div class="plabel"></div>
      </div>).join('');
  } else {
    document.getElementById('photosSection').style.display = 'none';
  }

  // Belgeler
  const { data: docs } = await db.from('documents').select('*').eq('visit_id', id);
  const kart = (docs||[]).filter(d => d.doc_type === 'kart');
  const onam = (docs||[]).filter(d => d.doc_type === 'onam');
  const barkod = (docs||[]).filter(d => d.doc_type === 'barkod');

  showDocs('kartSection', 'kartGrid', kart);
  showDocs('onamSection', 'onamGrid', onam);
  showDocs('barkodSection', 'barkodGrid', barkod);
}

function showDocs(sectionId, gridId, docs) {
  if (!docs.length) { document.getElementById(sectionId).style.display = 'none'; return; }
  document.getElementById(sectionId).style.display = 'block';
  document.getElementById(gridId).innerHTML = docs.map((d,i) => 
    <div class="doc-card">
      <img src="" onclick="openLightbox('')"/>
      <div class="dlabel"></div>
    </div>).join('');
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

async function downloadJSON() {
  const { data: patients } = await db.from('patients').select('*').eq('clinic_id', clinicId);
  const allData = [];
  for (const p of patients||[]) {
    const { data: visits } = await db.from('visits').select('*').eq('patient_id', p.id);
    const vWithData = [];
    for (const v of visits||[]) {
      const { data: photos } = await db.from('photos').select('*').eq('visit_id', v.id);
      const { data: docs } = await db.from('documents').select('*').eq('visit_id', v.id);
      vWithData.push({ ...v, photos: photos||[], documents: docs||[] });
    }
    allData.push({ ...p, visits: vWithData });
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify({ export_date: new Date().toISOString(), patients: allData }, null, 2)], { type: 'application/json' }));
  a.download = 'aafc_backup_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
}

async function downloadCSV() {
  const { data: patients } = await db.from('patients').select('id,name,surname').eq('clinic_id', clinicId);
  const rows = ['Patient Name,Patient Surname,Visit Date,Region,Photo URL'];
  for (const p of patients||[]) {
    const { data: visits } = await db.from('visits').select('*').eq('patient_id', p.id);
    for (const v of visits||[]) {
      const { data: photos } = await db.from('photos').select('*').eq('visit_id', v.id);
      for (const ph of photos||[]) rows.push([p.name, p.surname||'', v.visit_date||'', v.region||'', ph.file_path].join(','));
    }
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows.join('\n')], { type: 'text/csv' }));
  a.download = 'aafc_photos_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

init();
</script>
</body>
</html>
