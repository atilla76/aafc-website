<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - AAFC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#1C1929; color:#F5F1EB; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.box { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:20px; padding:40px; width:100%; max-width:400px; }
.logo { font-size:20px; font-weight:600; color:#B89A6A; letter-spacing:2px; text-align:center; margin-bottom:32px; }
h2 { font-size:24px; font-weight:400; margin-bottom:8px; }
p { color:rgba(245,241,235,0.4); font-size:14px; margin-bottom:32px; }
.lbl { display:block; font-size:12px; color:rgba(245,241,235,0.5); margin-bottom:6px; }
input { width:100%; background:rgba(245,241,235,0.06); border:1px solid rgba(245,241,235,0.12); border-radius:10px; padding:12px 14px; color:#F5F1EB; font-size:14px; margin-bottom:16px; outline:none; }
input:focus { border-color:rgba(184,154,106,0.4); }
.btn { width:100%; background:#B89A6A; border:none; border-radius:10px; padding:14px; color:#1C1929; font-size:15px; font-weight:600; cursor:pointer; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.msg { font-size:13px; margin-top:12px; text-align:center; line-height:1.6; }
.success { color:#4CAF50; }
.error { color:#E05555; }
.loading { color:#B89A6A; }
</style>
  <link rel="canonical" href="https://aafclinic.com/reset-password" />
</head>
<body>
<div class="box">
  <div class="logo">AAFC</div>
  <h2 id="title">Verifying...</h2>
  <p id="subtitle">Please wait while we verify your link</p>
  <span class="lbl" id="lbl1" style="display:none">NEW PASSWORD</span>
  <input type="password" id="pw1" placeholder="••••••••" style="display:none"/>
  <span class="lbl" id="lbl2" style="display:none">CONFIRM PASSWORD</span>
  <input type="password" id="pw2" placeholder="••••••••" style="display:none"/>
  <button class="btn" id="btn" onclick="doReset()" style="display:none">Update Password</button>
  <div class="msg" id="msg"><span class="loading">Verifying your link...</span></div>
</div>
<script>
var db = supabase.createClient(
  'https://hugxacklprzujswtaike.supabase.co',
  'sb_publishable_LX6iLHBbCePCCdnsTeVwlA_IE7BwBkX'
);

function showForm() {
  document.getElementById('title').textContent = 'New Password';
  document.getElementById('subtitle').textContent = 'Enter your new password below';
  document.getElementById('lbl1').style.display = 'block';
  document.getElementById('pw1').style.display = 'block';
  document.getElementById('lbl2').style.display = 'block';
  document.getElementById('pw2').style.display = 'block';
  document.getElementById('btn').style.display = 'block';
  document.getElementById('msg').innerHTML = '';
}

function showError(msg) {
  document.getElementById('title').textContent = 'Link Expired';
  document.getElementById('subtitle').textContent = '';
  document.getElementById('msg').innerHTML = '<span class="error">' + msg + '<br/><br/><a href="/" style="color:#B89A6A">Go back to app</a></span>';
}

window.onload = async function() {
  var search = new URLSearchParams(window.location.search);
  var hash = new URLSearchParams(window.location.hash.substring(1));
  var code = search.get('code');
  var accessToken = hash.get('access_token') || search.get('access_token');
  var refreshToken = hash.get('refresh_token') || search.get('refresh_token') || '';

  if (code) {
    try {
      var r = await db.auth.exchangeCodeForSession(code);
      if (r.error) {
        showError('This link has expired or already been used. Please request a new password reset.');
      } else {
        history.replaceState({}, document.title, '/reset-password.html');
        showForm();
      }
    } catch(e) {
      showError('Error: ' + e.message);
    }
  } else if (accessToken) {
    try {
      var r2 = await db.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      if (r2.error) {
        showError('This link has expired. Please request a new password reset.');
      } else {
        history.replaceState({}, document.title, '/reset-password.html');
        showForm();
      }
    } catch(e) {
      showError('Session error: ' + e.message);
    }
  } else {
    showError('Invalid link. Please request a new password reset.');
  }
};

async function doReset() {
  var pw = document.getElementById('pw1').value;
  var pw2 = document.getElementById('pw2').value;
  var msg = document.getElementById('msg');
  var btn = document.getElementById('btn');
  if (!pw) { msg.innerHTML = '<span class="error">Password is required</span>'; return; }
  if (pw !== pw2) { msg.innerHTML = '<span class="error">Passwords do not match</span>'; return; }
  if (pw.length < 6) { msg.innerHTML = '<span class="error">Password must be at least 6 characters</span>'; return; }
  btn.disabled = true;
  btn.textContent = 'Updating...';
  var r = await db.auth.updateUser({ password: pw });
  if (r.error) {
    msg.innerHTML = '<span class="error">' + r.error.message + '</span>';
    btn.disabled = false;
    btn.textContent = 'Update Password';
  } else {
    msg.innerHTML = '<span class="success">Password updated successfully!</span>';
    btn.textContent = 'Done';
    setTimeout(function() { window.location.href = '/'; }, 2000);
  }
}
</script>
</body>
</html>
