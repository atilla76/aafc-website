<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sifre Sifirlama - AAFC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1C1929; color: #F5F1EB; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .box { background: rgba(245,241,235,0.04); border: 1px solid rgba(245,241,235,0.08); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
  .logo { font-size: 20px; font-weight: 600; color: #B89A6A; letter-spacing: 2px; text-align: center; margin-bottom: 32px; }
  h2 { font-size: 24px; font-weight: 400; margin-bottom: 8px; }
  p { color: rgba(245,241,235,0.4); font-size: 14px; margin-bottom: 32px; }
  label { display: block; font-size: 12px; color: rgba(245,241,235,0.5); margin-bottom: 6px; }
  input { width: 100%; background: rgba(245,241,235,0.06); border: 1px solid rgba(245,241,235,0.12); border-radius: 10px; padding: 12px 14px; color: #F5F1EB; font-size: 14px; margin-bottom: 16px; }
  input:focus { outline: none; border-color: rgba(184,154,106,0.4); }
  .btn { width: 100%; background: #B89A6A; border: none; border-radius: 10px; padding: 14px; color: #1C1929; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { font-size: 13px; margin-top: 12px; text-align: center; }
  .success { color: #4CAF50; }
  .error { color: #E05555; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">AAFC</div>
  <h2>Yeni Sifre</h2>
  <p>Yeni sifrenizi belirleyin</p>
  <label>YENI SIFRE</label>
  <input type="password" id="password" placeholder="••••••••" />
  <label>SIFRE TEKRAR</label>
  <input type="password" id="password2" placeholder="••••••••" />
  <button class="btn" id="btn" onclick="resetPassword()">Sifreyi Guncelle</button>
  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const db = supabase.createClient(
  'https://hugxacklprzujswtaike.supabase.co',
  'sb_publishable_LX6iLHBbCePCCdnsTeVwlA_IE7BwBkX'
);

async function init() {
  const hash = window.location.hash;
  if (hash) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if (accessToken && refreshToken) {
      await db.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    }
  }
}

async function resetPassword() {
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');

  if (!password) { msg.textContent = 'Sifre zorunludur'; msg.className = 'msg error'; return; }
  if (password !== password2) { msg.textContent = 'Sifreler eslesmiyor'; msg.className = 'msg error'; return; }
  if (password.length < 6) { msg.textContent = 'Sifre en az 6 karakter olmali'; msg.className = 'msg error'; return; }

  btn.disabled = true;
  btn.textContent = 'Guncelleniyor...';

  const { error } = await db.auth.updateUser({ password });

  if (error) {
    msg.textContent = 'Hata: ' + error.message;
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Sifreyi Guncelle';
  } else {
    msg.textContent = 'Sifre basariyla guncellendi! Uygulamadan giris yapabilirsiniz.';
    msg.className = 'msg success';
    btn.disabled = true;
  }
}

init();
</script>
</body>
</html>
