<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - AAFC</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#1C1929; color:#F5F1EB; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.box { background:rgba(245,241,235,0.04); border:1px solid rgba(245,241,235,0.08); border-radius:20px; padding:40px; width:100%; max-width:400px; }
.logo { font-size:20px; font-weight:600; color:#B89A6A; letter-spacing:2px; text-align:center; margin-bottom:32px; }
h2 { font-size:24px; font-weight:400; margin-bottom:8px; }
p { color:rgba(245,241,235,0.4); font-size:14px; margin-bottom:32px; }
label { display:block; font-size:12px; color:rgba(245,241,235,0.5); margin-bottom:6px; }
input { width:100%; background:rgba(245,241,235,0.06); border:1px solid rgba(245,241,235,0.12); border-radius:10px; padding:12px 14px; color:#F5F1EB; font-size:14px; margin-bottom:16px; outline:none; }
input:focus { border-color:rgba(184,154,106,0.4); }
.btn { width:100%; background:#B89A6A; border:none; border-radius:10px; padding:14px; color:#1C1929; font-size:15px; font-weight:600; cursor:pointer; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.msg { font-size:13px; margin-top:12px; text-align:center; }
.success { color:#4CAF50; }
.error { color:#E05555; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">AAFC</div>
  <h2>New Password</h2>
  <p>Enter your new password below</p>
  <label>NEW PASSWORD</label>
  <input type="password" id="password" placeholder="••••••••"/>
  <label>CONFIRM PASSWORD</label>
  <input type="password" id="password2" placeholder="••••••••"/>
  <button class="btn" id="btn" onclick="resetPassword()">Update Password</button>
  <div class="msg" id="msg"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var db = supabase.createClient('https://hugxacklprzujswtaike.supabase.co', 'sb_publishable_LX6iLHBbCePCCdnsTeVwlA_IE7BwBkX');

window.onload = async function() {
  var hash = window.location.hash.substring(1);
  var search = window.location.search.substring(1);
  var params = new URLSearchParams(hash || search);
  var accessToken = params.get('access_token');
  var refreshToken = params.get('refresh_token') || '';
  var type = params.get('type');
  console.log('hash:', hash);
  console.log('access_token:', accessToken);
  console.log('type:', type);
  if (accessToken) {
    try {
      await db.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      document.getElementById('msg').innerHTML = '<span class="success">Session established. Enter your new password.</span>';
    } catch(e) {
      console.log('session error:', e);
      document.getElementById('msg').innerHTML = '<span class="error">Session error: ' + e.message + '</span>';
      document.getElementById('btn').disabled = true;
    }
  } else {
    document.getElementById('msg').innerHTML = '<span class="error">Invalid or expired link. Please request a new one.</span>';
    document.getElementById('btn').disabled = true;
  }
};

async function resetPassword() {
  var pw = document.getElementById('password').value;
  var pw2 = document.getElementById('password2').value;
  var msg = document.getElementById('msg');
  var btn = document.getElementById('btn');
  if (!pw) { msg.innerHTML = '<span class="error">Password is required</span>'; return; }
  if (pw !== pw2) { msg.innerHTML = '<span class="error">Passwords do not match</span>'; return; }
  if (pw.length < 6) { msg.innerHTML = '<span class="error">Password must be at least 6 characters</span>'; return; }
  btn.disabled = true; btn.textContent = 'Updating...';
  var res = await db.auth.updateUser({ password: pw });
  if (res.error) {
    msg.innerHTML = '<span class="error">' + res.error.message + '</span>';
    btn.disabled = false; btn.textContent = 'Update Password';
  } else {
    msg.innerHTML = '<span class="success">Password updated! You can now login.</span>';
    btn.textContent = 'Done';
    setTimeout(function() { window.location.href = '/'; }, 2000);
  }
}
</script>
</body>
</html>
